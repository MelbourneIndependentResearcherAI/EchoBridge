<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#1a0a2e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="EchoBridge" />
    <meta name="description" content="Your voice, your way. AI communication companion for autistic adults." />
    <title>EchoBridge</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #1a0a2e; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
      #splash {
        position: fixed; inset: 0; background: #1a0a2e;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        z-index: 9999; transition: opacity 0.4s ease;
      }
      #splash.hidden { opacity: 0; pointer-events: none; }
      .splash-icon { font-size: 64px; margin-bottom: 20px; animation: pulse 2s ease-in-out infinite; }
      .splash-title { color: #C084FC; font-size: 28px; font-weight: 800; margin-bottom: 6px; }
      .splash-sub { color: #9B7ED4; font-size: 14px; margin-bottom: 32px; font-style: italic; }
      .splash-dots { display: flex; gap: 8px; }
      .splash-dot { width: 8px; height: 8px; border-radius: 50%; background: #C084FC; animation: bounce 1s ease-in-out infinite; }
      .splash-dot:nth-child(2) { animation-delay: 0.15s; }
      .splash-dot:nth-child(3) { animation-delay: 0.3s; }
      @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
      @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    </style>
  </head>
  <body>
    <div id="splash">
      <div class="splash-icon">🌉</div>
      <div class="splash-title">EchoBridge</div>
      <div class="splash-sub">Your voice, your way.</div>
      <div class="splash-dots">
        <div class="splash-dot"></div>
        <div class="splash-dot"></div>
        <div class="splash-dot"></div>
      </div>
    </div>
    <div id="root"></div>
    <script>
      window.__hideSplash = function() {
        var s = document.getElementById('splash');
        if (s) { s.classList.add('hidden'); setTimeout(function(){ s.remove(); }, 400); }
      };
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
